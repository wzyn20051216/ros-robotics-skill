# =============================================================
# demo_params.yaml — minimal_demo 功能包参数配置文件
#
# 格式说明：
#   <节点名称>:
#     ros__parameters:
#       <参数名>: <参数值>
#
# 注意：节点名称必须与代码中 Node() 构造函数传入的名称一致，
#       或与 launch 文件中 name= 字段一致。
# =============================================================

talker_node:
  ros__parameters:
    # 消息前缀：talker 节点发布的每条消息都以此字符串开头
    # 类型：string
    # 默认值（代码中声明）："Hello"
    # 此处覆盖为更具描述性的前缀
    message_prefix: "Hello from minimal_demo"
